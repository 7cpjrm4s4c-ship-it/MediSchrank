<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
body { background:#09101f; padding:40px 20px; font-family:Arial,sans-serif; }

#theme-switcher {
  position: relative;
  display: flex;
  background: rgba(0,0,0,.35);
  border-radius: 999px;
  padding: 3px;
  gap: 0;
  max-width: 360px;
  margin: 0 auto 20px;
}
#theme-slider-thumb {
  position: absolute;
  top: 3px; bottom: 3px;
  left: 3px;
  width: calc(33.333% - 2px);
  border-radius: 999px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.28);
  box-shadow: 0 2px 12px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.2) inset;
  transition: left .22s cubic-bezier(.34,1.2,.64,1);
  pointer-events: none;
  z-index: 0;
}
#theme-switcher[data-mode="auto"]  #theme-slider-thumb { left: 3px; }
#theme-switcher[data-mode="light"] #theme-slider-thumb { left: calc(33.333% + 1px); }
#theme-switcher[data-mode="dark"]  #theme-slider-thumb { left: calc(66.666% - 1px); }

.theme-btn {
  flex: 1; position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: none; border: none; border-radius: 999px;
  padding: 10px 6px; cursor: pointer; color: #8fa8c0;
  font-family: Arial,sans-serif; font-size: 13px;
}
.theme-btn.active { color: #dde6f0; font-weight: 600; }
.tbtn-ico { font-size: 1rem; }
</style>
</head>
<body>

<div id="theme-switcher" data-mode="auto">
  <div id="theme-slider-thumb"></div>
  <button class="theme-btn active" id="tbtn-auto" onclick="set('auto')">
    <span class="tbtn-ico">⚙️</span> Auto
  </button>
  <button class="theme-btn" id="tbtn-light" onclick="set('light')">
    <span class="tbtn-ico">☀️</span> Hell
  </button>
  <button class="theme-btn" id="tbtn-dark" onclick="set('dark')">
    <span class="tbtn-ico">🌙</span> Dunkel
  </button>
</div>

<p style="color:#5eb8f5;text-align:center;font-size:13px">Tippe auf einen Button</p>

<script>
function set(mode) {
  document.getElementById('theme-switcher').setAttribute('data-mode', mode);
  ['auto','light','dark'].forEach(m => {
    document.getElementById('tbtn-'+m).classList.toggle('active', m===mode);
  });
}
</script>
</body></html>
